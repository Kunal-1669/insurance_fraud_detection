services:
  api:
    build: .
    container_name: fraud_detection_api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./mlruns:/app/mlruns
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  mlflow:
    image: python:3.11-slim
    container_name: fraud_detection_mlflow
    command: >
      sh -c "pip install mlflow --quiet &&
             mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri /mlruns"
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    restart: unless-stopped
